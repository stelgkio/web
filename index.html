<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var k = "affilflow-theme";
          var v = localStorage.getItem(k);
          var dark =
            v === "dark" ||
            (v !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
    <title>AffilFlow</title>
    <meta
      name="description"
      content="Run partner programs, track sales and commissions, and see company and affiliate dashboards."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
